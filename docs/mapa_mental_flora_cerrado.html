<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mapa Mental — Flora do Cerrado</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f0f4e8;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px;
  }

  svg {
    width: 1100px;
    height: 820px;
    overflow: visible;
  }

  /* ── Linhas de conexão ── */
  .linha { stroke-width: 2.5; fill: none; opacity: 0.7; }

  /* ── Nó central ── */
  .no-central ellipse {
    fill: #2d6a2d;
    stroke: #1a3d1a;
    stroke-width: 3;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
  }
  .no-central text {
    fill: #fff;
    font-weight: 700;
    font-size: 14px;
    text-anchor: middle;
    dominant-baseline: middle;
  }

  /* ── Nós de ramo ── */
  .no-ramo rect {
    rx: 12px; ry: 12px;
    filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2));
  }
  .no-ramo text {
    font-weight: 700;
    font-size: 12px;
    text-anchor: middle;
    dominant-baseline: middle;
    fill: #fff;
  }

  /* ── Nós folha ── */
  .no-folha rect {
    rx: 8px; ry: 8px;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.15));
  }
  .no-folha text {
    font-size: 10.5px;
    text-anchor: middle;
    dominant-baseline: middle;
    fill: #1a1a1a;
  }
</style>
</head>
<body>
<svg viewBox="0 0 1100 820" xmlns="http://www.w3.org/2000/svg">

  <!-- ══════════════════════════════════════════════
       LINHAS — ramo → folhas
  ══════════════════════════════════════════════ -->

  <!-- Dados REFLORA -->
  <line x1="550" y1="410" x2="210" y2="165" class="linha" stroke="#4a7c4a"/>
  <line x1="210" y1="165" x2="100" y2="90"  class="linha" stroke="#4a7c4a"/>
  <line x1="210" y1="165" x2="80"  y2="155" class="linha" stroke="#4a7c4a"/>
  <line x1="210" y1="165" x2="100" y2="220" class="linha" stroke="#4a7c4a"/>

  <!-- Tecnologia -->
  <line x1="550" y1="410" x2="820" y2="165" class="linha" stroke="#2e6b8f"/>
  <line x1="820" y1="165" x2="940" y2="90"  class="linha" stroke="#2e6b8f"/>
  <line x1="820" y1="165" x2="990" y2="160" class="linha" stroke="#2e6b8f"/>
  <line x1="820" y1="165" x2="960" y2="235" class="linha" stroke="#2e6b8f"/>

  <!-- Objetivo -->
  <line x1="550" y1="410" x2="820" y2="655" class="linha" stroke="#7b3f9e"/>
  <line x1="820" y1="655" x2="960" y2="580" class="linha" stroke="#7b3f9e"/>
  <line x1="820" y1="655" x2="990" y2="655" class="linha" stroke="#7b3f9e"/>
  <line x1="820" y1="655" x2="960" y2="730" class="linha" stroke="#7b3f9e"/>

  <!-- Bioma -->

  ══════════════════════════════════════════════ -->

    <text x="100" y="100">Flora e Funga do Brasil</text>
  </g>
  <g class="no-folha">
    <rect x="0"   y="130" width="150" height="50" fill="#d4edda" stroke="#4a7c4a" stroke-width="1"/>
    <text x="75"  y="149" font-weight="600">12.161 espécies</text>

  <g class="no-folha">

  <g class="no-folha">

    <text x="990" y="666">identificação de espécies</text>
    <text x="990" y="682" font-size="10">fitomorfologia do Cerrado</text>
  </g>
  <g class="no-folha">
    <rect x="866" y="706" width="188" height="48" fill="#ead5f5" stroke="#7b3f9e" stroke-width="1"/>
    <text x="960" y="724" font-weight="600">Apoio à Pesquisa</text>

  </g>

  <!-- ══════════════════════════════════════════════
       RAMO 4 — BIOMA (laranja)
  ══════════════════════════════════════════════ -->
  <g class="no-ramo">
    <rect x="120" y="630" width="180" height="50" rx="12" ry="12" fill="#b5640e" stroke="#7a4008" stroke-width="1.5"/>
    <text x="210" y="655">Bioma Cerrado</text>
  </g>
  <g class="no-folha">
    <rect x="-8"  y="555" width="176" height="50" fill="#fde8cc" stroke="#b5640e" stroke-width="1"/>
    <text x="80"  y="574" font-weight="600">2º maior bioma</text>

  <g class="no-folha">
    <rect x="-18" y="628" width="155" height="54" fill="#fde8cc" stroke="#b5640e" stroke-width="1"/>
    <text x="60"  y="648" font-weight="600">Foco em MS</text>
    <text x="60"  y="665">Mato Grosso do Sul</text>
    <text x="60"  y="681" font-size="10">+ distribuição por UF</text>
  </g>
  <g class="no-folha">
    <rect x="-2"  y="707" width="175" height="46" fill="#fde8cc" stroke="#b5640e" stroke-width="1"/>
    <text x="86"  y="724" font-weight="600">Formas de Vida</text>
    <text x="86"  y="741">árvore, arbusto, erva…</text>
  </g>

  <!-- ══════════════════════════════════════════════
       RAMO 5 — PARCEIROS (marrom)
  ══════════════════════════════════════════════ -->
  <g class="no-ramo">
    <rect x="460" y="135" width="180" height="50" rx="12" ry="12" fill="#a0522d" stroke="#6b3520" stroke-width="1.5"/>

  <g class="no-folha">

  <g class="no-folha">

    <text x="670" y="74"  font-weight="600">JBRJ</text>
    <text x="670" y="91">Jardim Botânico RJ</text>
  </g>

  <!-- ══════════════════════════════════════════════
       RAMO 6 — IMPACTO (verde água)
  ══════════════════════════════════════════════ -->
  <g class="no-ramo">
    <rect x="460" y="635" width="180" height="50" rx="12" ry="12" fill="#1a6b5a" stroke="#0d3d32" stroke-width="1.5"/>
    <text x="550" y="660">Impacto</text>
  </g>
  <g class="no-folha">
    <rect x="330" y="716" width="178" height="48" fill="#c8ede6" stroke="#1a6b5a" stroke-width="1"/>
    <text x="419" y="734" font-weight="600">Extensão Universitária</text>
    <text x="419" y="751">UFMS Digital 2026</text>
  </g>
  <g class="no-folha">

  <g class="no-folha">

    <text x="682" y="734" font-weight="600">Conservação</text>
    <text x="682" y="751">espécies endêmicas e</text>
  </g>

  <!-- ══════════════════════════════════════════════
       LEGENDA
  ══════════════════════════════════════════════ -->
  <rect x="380" y="355" width="340" height="110" rx="10" fill="white" opacity="0.15"/>
  <text x="550" y="375" text-anchor="middle" font-size="9" fill="#333" opacity="0.6">

</body>
